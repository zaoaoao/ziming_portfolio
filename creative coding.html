    document.querySelector(".fly").addEventListener("click", function () {
        myFunction();

    let clicktime = 0;

    function myFunction() {

        clicktime += 1;

        if (clicktime % 2 === 0) {
            document.querySelector(".info-page").style.display = "none";
            document.body.style.overflowY = "auto"
        }

        else {
            document.querySelector(".info-page").style.display = "block"
            document.body.style.overflowY = "hidden"

        }
    }
    window.onload = () => {

        animateDiv();


        document.querySelectorAll(".clickable").forEach(img => {
            const indexnr = img.dataset.nr;
            const currentList = urlLists[`urlList${indexnr}`];
            img.src = currentList[0].url;
            img.setAttribute("draggable", "false");


        });
    };

    function animateDiv() {

        const el = document.querySelector('.fly');

        move(el);

        function move(element) {

            const duration = Math.floor(Math.random() * 5000 + 10000);
            const pos = makeNewPosition();

            element.style.transition = `top ${duration / 100}s linear, left ${duration / 100}s linear`;
            element.style.top = pos.top + 'px';
            element.style.left = pos.left + 'px';

            setTimeout(() => move(element), duration);
        }
    }
    function makeNewPosition() {
        const h = window.innerHeight;
        const w = window.innerWidth;

        return {
            top: Math.random() * (h - 50),
            left: Math.random() * (w - 50)
        };
    }

    function updateCounter(img) {
        const counter = document.querySelector('.counter');
        if (!counter) return;

        const indexnr = img.dataset.nr;
        const currentList = urlLists[`urlList${indexnr}`];
        const currentIndex = parseInt(img.dataset.imgnr || 0, 10);

        counter.textContent = `${currentIndex + 1}/${currentList.length}`;
        counter.style.display = 'block';
    }
    document.addEventListener('click', e => {
        if (e.target.classList.contains('clickable')) {
            let inr = parseInt(e.target.dataset.imgnr || 0, 10);
            const indexnr = e.target.dataset.nr;

            const currentList = urlLists[`urlList${indexnr}`];
            inr = (inr + 1) % currentList.length;

            e.target.dataset.imgnr = inr;
            e.target.src = currentList[inr].url;

            updateCounter(e.target);
        }

    })

    document.querySelectorAll('.clickable').forEach(img => {

        img.addEventListener('mouseenter', function () {
            updateCounter(img);
        });

        img.addEventListener('mouseleave', function () {
            const counter = document.querySelector('.counter');
            if (counter) counter.style.display = 'none';
        });

    });

    const video = document.querySelector("video");

            document.querySelectorAll("video").forEach(el => {
                el.autoplay = false;
                // video.pause();


            }

            )


        } else {
            document.querySelectorAll("video").forEach(el => {
                el.autoplay = true;
                // video.pause();


            }

            )

        }
    }

    checkScreen();
    window.addEventListener("resize", checkScreen);


    document.querySelector(".bottom").addEventListener("click", () => {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });


</script>

</html>
